<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0c" />
    <title>Offline · My OS</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0c;
        color: #e8e8ea;
        font-family:
          ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 360px;
        text-align: center;
      }
      .mark {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: #111113;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
      }
      .mark span {
        width: 10px;
        height: 26px;
        border-radius: 3px;
        background: #6e7bff;
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        margin: 0 0 8px;
      }
      p {
        font-size: 14px;
        line-height: 1.5;
        color: #9a9aa2;
        margin: 0 0 20px;
      }
      button {
        appearance: none;
        border: 1px solid #2a2a30;
        background: #17171b;
        color: #e8e8ea;
        font: inherit;
        font-size: 14px;
        font-weight: 500;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
      }
      button:hover {
        background: #1f1f24;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark" aria-hidden="true"><span></span></div>
      <h1>You're offline</h1>
      <p>
        My OS can't reach the network right now. Pages you've already opened stay available; this
        one needs a connection. Reconnect and try again.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
