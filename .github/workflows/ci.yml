name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack (pnpm)
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Format check
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build

  database:
    name: Migrate · Connect
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: myos
          POSTGRES_PASSWORD: myos
          POSTGRES_DB: myos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U myos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://myos:myos@localhost:5432/myos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack (pnpm)
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Run migrations (enables extensions, applies empty baseline)
        run: pnpm db:migrate
      - name: Verify database connection
        run: pnpm db:check
